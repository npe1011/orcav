name: Build Executables

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x" # adjust if needed
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Build executable with PyInstaller
        run: uv run pyinstaller -y ORCAV.spec

      - name: Prepare distribution folder (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          copy LICENSE dist\ORCAV\
          copy THIRD-PARTY-LICENSES.md dist\ORCAV\

      - name: Prepare distribution folder (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          cp LICENSE dist/
          cp THIRD-PARTY-LICENSES.md dist/
          # Create a nice zip format without extra nesting
          cd dist
          zip -r ORCAV-macOS.zip ORCAV.app LICENSE THIRD-PARTY-LICENSES.md

      - name: Upload Artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ORCAV-Windows
          path: dist/ORCAV

      - name: Upload Artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ORCAV-macOS
          path: dist/ORCAV-macOS.zip
